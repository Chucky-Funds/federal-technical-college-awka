<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Receipt - FEDERAL SCIENCE AND TECHNICAL COLLEGE AWKA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="https://platformeduportal.com/resources/clients/uploads/logo/0357143669.jpg">
  <style>
    body { background: #f5f5f5; font-family: Arial, sans-serif; margin: 0; }
    .container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 40px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h2 { color: #006633; margin-bottom: 8px; }
    .download-btn { display: block; margin: 30px auto 0 auto; background: #006633; color: #fff; border: none; border-radius: 4px; padding: 16px 32px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
    .download-btn:hover { background: #004d00; }
    #invoiceContainer { margin-top: 20px; }
    /* Enhanced table styles */
    .invoice-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
    }
    .invoice-table th, .invoice-table td {
      border: 1px solid #ccc;
      padding: 12px 16px;
      background: #fff;
    }
    .invoice-table th {
      background: #f1f1f1;
      font-weight: bold;
    }
    .invoice-table tr:not(:last-child) td {
      border-bottom: 1.5px solid #e0e0e0;
    }
    .invoice-table td.amount-col {
      text-align: right;
    }
    .invoice-table td.num-col {
      text-align: center;
    }
    .invoice-table tr:last-child td {
      font-weight: bold;
      background: #f9f9f9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Payment Receipt</h2>
      <p>Your payment was successful. Download your invoice below.</p>
    </div>
    <div id="invoiceContainer"></div>
    <button class="download-btn" id="downloadBtn">Download as PDF</button>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    // Invoice rendering logic (same as pay.html)
    function buildInvoiceHTML(data) {
      const logoUrl = "https://platformeduportal.com/resources/clients/uploads/logo/0357143669.jpg";
      const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + data.rrr;
      let rawAvatarSvg = '';
      if (data.gender === 'FEMALE') {
        rawAvatarSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#f07c38"/><path d="M20 100 c0-35 15-35 30-35 s30 0 30 35 z" fill="#d1d5d8"/><rect x="42" y="45" width="16" height="25" fill="#dca380"/><path d="M42 60 q8 8 16 0 v8 h-16 z" fill="#c38d6b"/><circle cx="28" cy="45" r="5" fill="#dca380"/><circle cx="72" cy="45" r="5" fill="#dca380"/><path d="M25 60 q-5-40 25-45 q30 5 25 45 q-5 10-10 0 q-15 20-30 0 q-5 10-10 0 z" fill="#361f13"/><path d="M30 40 c0 20 5 28 20 28 s20-8 20-28 s-5-20-20-20 s-20 0-20 20 z" fill="#f4bf9a"/><path d="M26 35 q 0-20 20-25 t 25 15 q-15-10-30 0 q-10 5-15 10 z" fill="#361f13"/></svg>`;
      } else {
        rawAvatarSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#f07c38"/><path d="M15 100 c0-35 15-40 35-40 s35 5 35 40 z" fill="#d1d5d8"/><path d="M46 65 l8 0 l-3 35 l-2 0 z" fill="#3a4045"/><polygon points="46,65 54,65 50,73" fill="#2b3035"/><polygon points="25,55 50,80 45,65" fill="#ffffff"/><polygon points="75,55 50,80 55,65" fill="#ffffff"/><rect x="42" y="45" width="16" height="25" fill="#dca380"/><path d="M42 62 q8 8 16 0 v8 h-16 z" fill="#c38d6b"/><circle cx="28" cy="45" r="5" fill="#dca380"/><circle cx="72" cy="45" r="5" fill="#dca380"/><path d="M30 40 c0 20 5 28 20 28 s20-8 20-28 s-5-20-20-20 s-20 0-20 20 z" fill="#f4bf9a"/><path d="M26 35 q 0-20 20-25 t 25 15 q 5-10 -10-15 q 20 5 0 25 q 10-10 -10-5 q -15 10 -25 5 z" fill="#361f13"/><path d="M30 25 l 6-8 l 4 6 l 7-10 l 5 8 l 8-8 l 2 12 q -15-8 -32 0 z" fill="#361f13"/></svg>`;
      }
      const avatarSvg = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(rawAvatarSvg);
      let rowsHtml = '';
      data.items.forEach((item, index) => {
        rowsHtml += `<tr><td class="num-col">${index + 1}</td><td>${item.name}</td><td class="amount-col">${item.amount.toLocaleString()}</td></tr>`;
      });
      return `<div class="generated-invoice" style="background:#fff;width:100%;max-width:790px;padding:40px;box-shadow:0 5px 15px rgba(0,0,0,0.2);position:relative;color:#000;">
        <img src="${logoUrl}" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:450px;opacity:0.04;pointer-events:none;z-index:0;" alt="Watermark">
        <div class="invoice-content" style="position:relative;z-index:1;">
          <div class="invoice-top-header" style="display:flex;align-items:center;justify-content:center;gap:20px;">
            <img src="${logoUrl}" width="70" alt="Logo">
            <h2 style="font-size:18px;font-weight:bold;margin:0;color:#000;letter-spacing:0.5px;">FEDERAL TECHNICAL COLLEGE, AWKA</h2>
          </div>
          <div class="invoice-subtitle" style="text-align:center;font-size:13px;font-weight:bold;margin-top:20px;margin-bottom:30px;">
            BILL INVOICE - ${data.classGrp} ${data.term.toUpperCase()} 2025/2026
          </div>
          <div class="invoice-details-box" style="display:flex;border:1px solid #ccc;margin-bottom:25px;">
            <div class="invoice-details-left" style="flex:1.2;padding:15px;border-right:1px solid #ccc;">
              <span class="invoice-name" style="font-size:13px;font-weight:bold;margin-bottom:12px;display:block;">${data.fullName}</span>
              <div class="invoice-text-row" style="font-size:10px;line-height:1.6;">
                USERNAME: ${data.username}<br>GENDER: ${data.gender}<br>EMAIL: ${data.email}<br>PHONE: ${data.phone}
              </div>
            </div>
            <div class="invoice-details-middle" style="flex:1;padding:15px;border-right:1px solid #ccc;">
              <div class="invoice-text-row" style="font-size:10px;line-height:1.6;">
                CURRENT CLASS: <strong>${data.className}</strong><br>HOUSE:<br>RESIDENCE: ${data.residence}
              </div>
            </div>
            <div class="invoice-details-right" style="width:120px;display:flex;align-items:center;justify-content:center;padding:10px;">
              <img src="${avatarSvg}" alt="Student Avatar" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">
            </div>
          </div>
          <div class="invoice-rrr-section" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
            <img src="${qrUrl}" width="80" alt="QR Code">
            <div class="invoice-rrr-text" style="font-size:18px;font-weight:bold;">
              RRR: ${data.rrr} <span style="color:#006633;">PAID</span>
            </div>
          </div>
          <table class="invoice-table" style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:20px;">
            <thead><tr><th class="num-col" style="background:#f1f1f1;font-weight:bold;text-align:center;width:40px;">#</th><th style="background:#f1f1f1;font-weight:bold;text-align:left;">FEES</th><th class="amount-col" style="background:#f1f1f1;font-weight:bold;text-align:right;width:130px;">AMOUNT (NGN)</th></tr></thead>
            <tbody>${rowsHtml}<tr><td colspan="2" style="font-weight:bold;">TOTAL</td><td class="amount-col" style="font-weight:bold;">${data.totalFormatted}</td></tr></tbody>
          </table>
          <div class="invoice-footer" style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:40px;font-size:9px;color:#333;">
            <div>Generated at ${data.dateStr}</div>
            <img src="arms.png" alt="Coat of Arms" width="40">
          </div>
        </div>
      </div>`;
    }
    // Load invoice data from localStorage
    let invoiceData = null;
    try {
      invoiceData = JSON.parse(localStorage.getItem('fstc_invoice'));
    } catch (e) { invoiceData = null; }
    if (!invoiceData) {
      document.getElementById('invoiceContainer').innerHTML = '<p style="color:red;font-weight:bold;">No invoice found. Please return to payment page.</p>';
      document.getElementById('downloadBtn').style.display = 'none';
    } else {
      document.getElementById('invoiceContainer').innerHTML = buildInvoiceHTML(invoiceData);
    }
    // PDF download logic
    document.getElementById('downloadBtn').addEventListener('click', function() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
      doc.html(document.getElementById('invoiceContainer'), {
        callback: function(pdf) {
          pdf.save('FSTC_AWKA_Invoice_' + (invoiceData.rrr || 'receipt') + '.pdf');
        },
        margin: [20, 20, 20, 20],
        autoPaging: true,
        x: 0,
        y: 0,
        width: 570
      });
    });
  </script>
</body>
</html>
